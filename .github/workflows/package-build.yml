name: Package Build - NTIS UI (Turbopack)

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version (e.g., 1.2.3.4)
        required: true
        type: string
      branch:
        description: Branch to build from
        required: false
        type: choice
        options:
          - main
          - qa
          - dev
        default: main

env:
  RELEASE_VERSION: ${{ github.event.inputs.version }}
  TARGET_BRANCH: ${{ github.event.inputs.branch || 'main' }}

jobs:
  build-ui:
    name: Build UI with Turbopack
    runs-on: [self-hosted, package]
    outputs:
      version: ${{ steps.package-build.outputs.version }}
      artifact-name: ${{ steps.package-build.outputs.artifact-name }}
      environment: ${{ steps.package-build.outputs.environment }}
      branch: ${{ steps.package-build.outputs.branch }}
    steps:
      - name: Checkout NTIS-UI
        uses: actions/checkout@v5
        with:
          ref: ${{ env.TARGET_BRANCH }}

      - name: Run package build action
        id: package-build
        uses: ./.github/actions/package-build
        with:
          version: ${{ env.RELEASE_VERSION }}
          branch: ${{ env.TARGET_BRANCH }}
          branch-env-map: ${{ vars.BRANCH_ENV_MAP }}
          package-container-name: ${{ vars.PACKAGE_CONTAINER_NAME }}
          package-connection-string: ${{ secrets.PACKAGE_CONNECTION_STRING }}

  build-summary:
    name: Build Summary
    runs-on: [self-hosted, package]
    needs: build-ui
    if: always()
    steps:
      - name: Summarize build results
        shell: pwsh
        run: |
          $version = '${{ needs.build-ui.outputs.version }}'
          $buildStatus = '${{ needs.build-ui.result }}'

          Write-Output "NTIS-UI Build Summary"
          Write-Output "====================="
          Write-Output "Version: v$version"
          Write-Output "Environment: ${{ needs.build-ui.outputs.environment }}"
          Write-Output "Build Tool: Next.js with Turbopack"
          Write-Output "Build Status: $buildStatus"
          Write-Output "Artifact: ${{ needs.build-ui.outputs.artifact-name }}"
          Write-Output ""

          if ($buildStatus -eq 'success') {
            Write-Output "NTIS-UI build completed successfully"
            Write-Output "Production artifacts are ready for deployment"
            Write-Output "Turbopack optimization applied"
          } else {
            Write-Warning "NTIS-UI build encountered issues"
            Write-Output "Please check the build logs for details"
          }

